services:
  - type: web
    name: chatlet2
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: MOD_PASSWORD
        sync: false
      - key: METERED_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: STATS_PASSWORD
        sync: false
      - key: IPHUB_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
